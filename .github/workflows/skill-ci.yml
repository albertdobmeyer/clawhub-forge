name: Skill CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tools/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'tools/**'
      - 'tests/**'

jobs:
  lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: make lint

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run security scanner
        run: make scan

  test:
    name: Skill Tests
    runs-on: ubuntu-latest
    needs: [lint, scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install pyyaml
      - name: Run tests
        run: make test

